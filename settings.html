<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Eye of Sauron — Definições</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #2a1a0e 0%, #1a1a2e 100%);
      border-bottom: 2px solid #c0a060;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header img { width: 36px; height: 36px; border-radius: 4px; border: 1px solid #c0a06055; }
    .header-title { font-size: 15px; font-weight: bold; color: #c0a060; letter-spacing: 1px; }
    .header-sub   { font-size: 11px; color: #666; margin-top: 2px; }

    .content { flex: 1; padding: 20px 24px; overflow-y: auto; }

    h2 {
      font-size: 12px;
      color: #c0a060;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-bottom: 7px;
      border-bottom: 1px solid #2a2a4a;
    }
    h2 + * { }

    /* Schedules */
    .schedules-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }

    .schedule-row {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #0f0f1f;
      border: 1px solid #2a2a4a;
      border-radius: 5px;
      padding: 8px 10px;
    }
    .sched-group {
      flex: 1; min-width: 0;
      background: #1a1a2e; border: 1px solid #333; color: #eee;
      border-radius: 4px; font-size: 12px; padding: 4px 6px; outline: none; cursor: pointer;
    }
    .sched-group:focus { border-color: #c0a060; }
    .sched-num {
      width: 46px; padding: 4px 6px;
      background: #1a1a2e; border: 1px solid #333;
      border-radius: 4px; color: #eee; font-size: 12px; outline: none; text-align: center;
    }
    .sched-num:focus { border-color: #c0a060; }
    .sched-label { font-size: 11px; color: #555; white-space: nowrap; }
    .btn-sched-del {
      background: none; border: 1px solid #3a2a2a; color: #555;
      border-radius: 3px; font-size: 11px; cursor: pointer; padding: 3px 7px;
      flex-shrink: 0;
    }
    .btn-sched-del:hover { border-color: #f44336; color: #f44336; }

    .btn-add-schedule {
      width: 100%; padding: 7px;
      background: transparent; color: #555;
      border: 1px dashed #2a2a4a; border-radius: 5px;
      font-size: 12px; cursor: pointer; margin-bottom: 14px;
    }
    .btn-add-schedule:hover { border-color: #c0a060; color: #c0a060; }

    .btn-save {
      width: 100%; margin-top: 4px; padding: 9px;
      background: #c0a060; color: #1a1a2e;
      border: none; border-radius: 5px;
      font-size: 13px; font-weight: bold; cursor: pointer;
    }
    .btn-save:hover { background: #d4b070; }

    .btn-extract {
      width: 100%; margin-top: 10px; padding: 8px;
      background: transparent; color: #c0a060;
      border: 1px solid #c0a060; border-radius: 5px;
      font-size: 12px; cursor: pointer;
    }
    .btn-extract:hover { background: rgba(192,160,96,0.1); }

    #status { margin-top: 8px; font-size: 11px; text-align: center; min-height: 16px; }
    .s-ok  { color: #4caf50; }
    .s-err { color: #f44336; }

    .section { margin-bottom: 20px; }

    .empty-schedules { font-size: 12px; color: #333; text-align: center; padding: 10px 0; }
  </style>
</head>
<body>
  <div class="header">
    <img id="eyeImg" alt="">
    <div>
      <div class="header-title">EYE OF SAURON</div>
      <div class="header-sub">Definições</div>
    </div>
  </div>

  <div class="content">

    <!-- Grupos do jogo -->
    <div class="section">
      <h2>Grupos do jogo</h2>
      <button class="btn-extract" id="extractGroupsBtn">⟳ Extrair grupos do jogo</button>
      <div id="extractStatus" style="margin-top:6px;font-size:11px;color:#555;min-height:14px;"></div>
    </div>

    <!-- Agendamentos de atualização -->
    <div class="section">
      <h2>Agendamentos de atualização</h2>
      <div class="schedules-list" id="schedulesList">
        <div class="empty-schedules">Sem agendamentos.</div>
      </div>
      <button class="btn-add-schedule" id="addScheduleBtn">+ Adicionar agendamento</button>
      <button class="btn-save" id="saveBtn">Guardar definições</button>
      <div id="status"></div>
    </div>

  </div>

  <script src="settings.js"></script>
</body>
</html>
